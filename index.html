        /* --- DESIGN SYSTEM (Seniorengerecht & Barrierefrei) --- */
        :root {
            --primary: #2e7d32;        /* Ein ruhiges, medizinisches Grün mit hohem Kontrast */
            --primary-hover: #1b5e20;
            --bg-color: #f4f6f4;
            --text-color: #1a1a1a;     /* Fast Schwarz für perfekten Kontrast (WCAG AAA) */
            --border-color: #767676;   /* Deutliche Rahmen für nachlassende Sehkraft */
            --error-color: #c62828;
            --success-color: #43a047;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            font-size: 20px; /* Große Basisschrift für bessere Lesbarkeit */
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 750px;
            margin: 40px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 32px;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 10px;
        }

        .intro-text {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        /* --- FORTSCHRITTSANZEIGE (Der grüne Balken) --- */
        .progress-container {
            margin-bottom: 35px;
        }

        .progress-text {
            font-weight: bold;
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
        }

        .progress-bar-bg {
            background-color: #e0e0e0;
            border-radius: 12px;
            height: 16px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--success-color);
            width: 20%; /* Start bei 20% (Schritt 1 von 5) */
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- SCHRITTE-LOGIK --- */
        .form-step {
            display: none; /* Versteckt alle Schritte standardmäßig */
        }

        .form-step.active {
            display: block; /* Zeigt nur den aktiven Schritt */
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        legend {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            padding: 0;
        }

        /* --- FORMULARELEMENTE --- */
        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .helper-text {
            font-size: 16px;
            color: #666;
            margin-top: -6px;
            margin-bottom: 10px;
            display: block;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 20px; /* Keine Verkleinerung beim Tippen */
            color: var(--text-color);
            background-color: #fff;
        }

        input:focus, textarea:focus, select:focus {
            outline: 3px solid var(--primary);
            outline-offset: 1px;
        }

        .choice-label {
            display: flex;
            align-items: center;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            font-weight: normal;
            transition: background 0.2s;
        }

            background-color: #f9f9f9;
        }
