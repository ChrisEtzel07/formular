<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfrage Krankenhausbehandlung - Einfach & Sicher</title>
    <style>
        /* === GRUND-STYLING FÜR SENIOREN-UX === */
        :root {
            --primary: #16a34a; /* Vertrauenerweckendes, klares Grün */
            --primary-hover: #15803d;
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
            --error: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            font-size: 18px; /* Große Grundschrift für bessere Lesbarkeit */
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: #0f172a;
        }
        
        p.subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }

        /* === FORTSCHRITTSBALKEN (ERFOLGSERLEBNIS) === */
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 99px;
            height: 16px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 20%; /* Startwert für Schritt 1 von 5 */
            transition: width 0.4s ease-in-out;
            border-radius: 99px;
        }

        .step-indicator {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
        }

        /* === FORMULAR SCHRITTE === */
        .form-step {
            display: none; /* Versteckt alle Schritte initial */
            animation: fadeIn 0.4s;
        }
        .form-step.active {
            display: block; /* Zeigt nur den aktiven Schritt */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === EINGABEFELDER (GROSS & DEUTLICH) === */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.2);
        }

        /* Große Radio-Buttons / Checkboxen für Motorik-Einschränkungen */
        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .radio-label {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            padding: 15px 25px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: normal;
            flex: 1;
            min-width: 200px;
        }

        .radio-label input {
            margin-right: 15px;
            width: 24px;
            height: 24px;
            accent-color: var(--primary);
        }

        .radio-label:hover {
            border-color: var(--primary);
        }

        /* === NAVIGATION BUTTONS === */
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-prev {
            background-color: #e2e8f0;
            color: #475569;
        }
        .btn-prev:hover {
            background-color: #cbd5e1;
        }

        .btn-next, .btn-submit {
            background-color: var(--primary);
            color: white;
        }
        .btn-next:hover, .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* DSGVO Hinweis */
        .dsgvo-box {
            background: #f0fdf4;
            border: 2px solid #bbf7d0;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .dsgvo-box label {
            font-weight: normal;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anfrage zur Aufnahme</h1>
    <p class="subtitle">Wir führen Sie Schritt für Schritt durch die Anfrage.</p>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <form id="clinicForm" action="#" method="POST" onsubmit="return false;">

                <input type="text" id="firstName" name="firstName" autocomplete="given-name" required>
            </div>

                <label for="lastName">Nachname *</label>
                <input type="text" id
